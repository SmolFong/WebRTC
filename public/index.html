<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Group Call - TURN & Monitoring</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .setup-container { background: #1e1e1e; padding: 30px; border-radius: 12px; max-width: 400px; margin: 50px auto; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #2c2c2c; color: white; font-size: 16px; }
        button { padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background: #007bff; color: white; transition: 0.3s; }
        button:hover { background: #0056b3; }
        
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-wrapper { position: relative; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        .name-tag { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 6px; font-size: 13px; }
        .stats-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; font-size: 11px; color: #00ff00; }
        .connection-status { position: absolute; top: 10px; left: 10px; font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #444; }

        #call-ui { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .alert-box { background: #ffc107; color: #000; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; font-weight: bold; }
        
        /* Chỗ nhập IP TURN thủ công để dễ test */
        .turn-config { margin-bottom: 15px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <div id="setup-ui" class="setup-container">
            <h2>WebRTC Group Call</h2>
            <p style="color: #888;">Giai đoạn: Cấu hình TURN Server</p>
            
            <div class="turn-config">
                <label>IP của máy Mac (để chạy TURN):</label><br>
                <input type="text" id="turnIpInput" placeholder="VD: 192.168.1.15" style="width: 60%; padding: 5px;">
            </div>

            <input type="text" id="nameInput" placeholder="Tên nickname...">
            <input type="text" id="roomInput" placeholder="Mã phòng...">
            <button onclick="joinRoom()">Tham gia phòng</button>
        </div>

        <div id="call-ui">
            <div class="header">
                <div id="roomDisplay">Phòng: -</div>
                <button style="background: #dc3545;" onclick="leaveRoom()">Kết thúc cuộc gọi</button>
            </div>
            
            <div id="p2pAlert" class="alert-box">⚠️ P2P failed, trying TURN / Relay...</div>

            <div id="video-grid">
                <div class="video-wrapper" id="localVideoWrapper">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="name-tag">Bạn (Cá nhân)</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoGrid = document.getElementById('video-grid');
        const p2pAlert = document.getElementById('p2pAlert');
        
        let localStream;
        let ws;
        let peerConnections = {}; 
        let remoteNames = {};

        // Hàm lấy cấu hình ICE động (Yêu cầu A1)
        function getIceConfig() {
            const turnIp = document.getElementById('turnIpInput').value.trim() || window.location.hostname;
            
            return {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { 
                        urls: `turn:${turnIp}:3478?transport=udp`, 
                        username: 'user123', 
                        credential: 'password123' 
                    },
                    { 
                        urls: `turn:${turnIp}:3478?transport=tcp`, 
                        username: 'user123', 
                        credential: 'password123' 
                    }
                ],
                iceCandidatePoolSize: 10
            };
        }

        async function joinRoom() {
            const name = document.getElementById('nameInput').value.trim();
            const roomId = document.getElementById('roomInput').value.trim();
            if (!name || !roomId) return alert("Nhập đủ thông tin!");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('call-ui').style.display = 'block';
                document.getElementById('roomDisplay').innerText = `Phòng: ${roomId} | Nick: ${name}`;

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}`);
                ws.onmessage = handleSignaling;
                ws.onopen = () => ws.send(JSON.stringify({ type: 'join', name, roomId }));
            } catch (e) { alert("Lỗi camera: " + e.message); }
        }

        async function handleSignaling(event) {
            const msg = JSON.parse(event.data);
            switch (msg.type) {
                case 'room-members':
                    msg.members.forEach(m => {
                        remoteNames[m.id] = m.name;
                        initiateCall(m.id, m.name);
                    });
                    break;
                case 'offer':
                    remoteNames[msg.sender] = msg.senderName || "Người dùng";
                    await handleOffer(msg);
                    break;
                case 'answer':
                    await peerConnections[msg.sender].setRemoteDescription(new RTCSessionDescription(msg.answer));
                    break;
                case 'candidate':
                    if (peerConnections[msg.sender]) {
                        await peerConnections[msg.sender].addIceCandidate(new RTCIceCandidate(msg.candidate));
                    }
                    break;
                case 'member-left':
                    closePeerConnection(msg.id);
                    break;
            }
        }

        async function initiateCall(targetId, targetName) {
            const pc = createPeer(targetId, targetName);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', target: targetId, offer }));
        }

        async function handleOffer(msg) {
            const pc = createPeer(msg.sender, remoteNames[msg.sender]);
            await pc.setRemoteDescription(new RTCSessionDescription(msg.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            ws.send(JSON.stringify({ type: 'answer', target: msg.sender, answer }));
        }

        function createPeer(remoteId, remoteName) {
            if (peerConnections[remoteId]) return peerConnections[remoteId];

            // Sử dụng cấu hình ICE vừa nhập
            const pc = new RTCPeerConnection(getIceConfig());
            peerConnections[remoteId] = pc;

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = (e) => addRemoteVideo(remoteId, remoteName, e.streams[0]);
            pc.onicecandidate = (e) => {
                if (e.candidate) ws.send(JSON.stringify({ type: 'candidate', target: remoteId, candidate: e.candidate }));
            };

            // A2. Theo dõi trạng thái & Fallback cảnh báo
            let connectionTimeout = setTimeout(() => {
                if (pc.iceConnectionState !== 'connected' && pc.iceConnectionState !== 'completed') {
                    p2pAlert.style.display = 'block';
                }
            }, 10000); // Giảm xuống 10s để test nhanh

            pc.oniceconnectionstatechange = () => {
                const statusLabel = document.getElementById(`status-${remoteId}`);
                if (statusLabel) statusLabel.innerText = pc.iceConnectionState;
                
                if (pc.iceConnectionState === 'connected') {
                    clearTimeout(connectionTimeout);
                    p2pAlert.style.display = 'none';
                }
            };

            setInterval(() => {
                if (pc.iceConnectionState === 'connected') {
                    updateStats(pc, remoteId);
                }
            }, 3000);

            return pc;
        }

        async function updateStats(pc, id) {
            try {
                const stats = await pc.getStats();
                let report = "Calculating...";
                
                stats.forEach(report_item => {
                    if (report_item.type === 'candidate-pair' && report_item.state === 'succeeded' && report_item.nominated) {
                        const remoteCandidate = stats.get(report_item.remoteCandidateId);
                        if (remoteCandidate) {
                            // In log ra console để SV đưa vào report.md (Yêu cầu A3)
                            console.log(`Stats [${id}]: Type=${remoteCandidate.candidateType}, Protocol=${remoteCandidate.protocol}`);
                            report = `${remoteCandidate.candidateType.toUpperCase()} (${remoteCandidate.protocol.toUpperCase()})`;
                        }
                    }
                });
                
                const statsLabel = document.getElementById(`stats-${id}`);
                if (statsLabel) statsLabel.innerText = report;
            } catch (err) {
                console.error("Lỗi lấy stats:", err);
            }
        }

        function addRemoteVideo(id, name, stream) {
            if (document.getElementById(`wrapper-${id}`)) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'video-wrapper';
            wrapper.id = `wrapper-${id}`;
            wrapper.innerHTML = `
                <video id="video-${id}" autoplay playsinline></video>
                <div class="connection-status" id="status-${id}">connecting...</div>
                <div class="stats-tag" id="stats-${id}">loading stats...</div>
                <div class="name-tag">${name}</div>
            `;
            videoGrid.appendChild(wrapper);
            document.getElementById(`video-${id}`).srcObject = stream;
        }

        function closePeerConnection(id) {
            if (peerConnections[id]) { peerConnections[id].close(); delete peerConnections[id]; }
            const w = document.getElementById(`wrapper-${id}`);
            if (w) w.remove();
        }

        function leaveRoom() { location.reload(); }
    </script>
</body>
</html>
